<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Styles</title>
    <style type="text/css">
      div {
        color: red;
        font-size: 12px;
      }

      p {
        font-size: 24px;
        font-weight: 100;
      }

      span {
        background-color: yellow;
        color: red;
        font-weight: 900;
        text-decoration: underline;
      }

      h1 {
        color: purple;
      }

      h2 {
        color: #ff00ff;
      }

      h3,
      h4,
      h5,
      h6 {
        color: #00ffff;
      }
    </style>
  </head>
  <body>
    <div>영역 1</div>
    <div>영역 2</div>

    <p>단락 1</p>
    <p>단락 2</p>

    <span>강조 1</span>
    <span>강조 2</span>

    <h1>H1</h1>
    <h2>H2</h2>
    <h3>H3</h3>
    <h4>H4</h4>
    <h5>H5</h5>
    <h6>H6</h6>
  </body>
</html>
