<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="./18_forms.css" />
  </head>
  <body>
    <div class="grid">
      <label for="email">이메일</label>
      <input type="email" name="" id="email" />
      <label for="user-password">비밀번호</label>
      <input type="password" name="" id="user-password" />

      <label for="male">성별</label>
      <div>
        <input type="radio" name="gender" id="male" />
        <label for="male">남</label>
        <input type="radio" name="gender" id="female" />
        <label for="female">여</label>
      </div>

      <label for="insta">가입경로</label>
      <div>
        <input type="checkbox" name="channel" id="insta" />
        <label for="insta">인스타그램</label>
        <input type="checkbox" name="channel" id="x" />
        <label for="x">X (구 트위터)</label>
        <input type="checkbox" name="channel" id="intro" />
        <label for="intro">지인 소개</label>
        <input type="checkbox" name="channel" id="youtube" />
        <label for="youtube">유튜브</label>
      </div>

      <label for="jobs">직업</label>
      <select name="" id="jobs">
        <option value="">(선택)</option>
        <option value="">관련산업종사자</option>
        <option value="">일반인</option>
        <option value="">학생</option>
        <option value="">기타</option>
      </select>

      <label for="other">하고 싶은 말</label>
      <textarea name="" id="other"></textarea>
    </div>
  </body>
</html>
