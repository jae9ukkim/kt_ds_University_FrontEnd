<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="./18_naver_form.css" />
  </head>
  <body>
    <div class="form">
      <div class="basic-info">
        <label for="user-id">i</label>
        <input type="text" id="user-id" placeholder="아이디" />
        <span>@naver.com</span>
        <label for="user-pw">l</label>
        <input type="password" id="user-pw" placeholder="비밀번호" />
        <span>h</span>
        <label for="user-mail">m</label>
        <input
          type="email"
          id="user-mail"
          placeholder="[선택] 이메일주소 (비밀번호 찾기 등 본인 확인용)"
        />
        <span></span>
      </div>
      <div class="personal-info">
        <label for="user-name">n</label>
        <input type="text" id="user-name" placeholder="이름" />

        <label for="birth">b</label>
        <input
          type="text"
          id="birth"
          placeholder="생년월일 8자리"
          maxlength="8"
        />

        <label for="mobile-service">s</label>
        <select name="" id="mobile-service">
          <option value="">통신사 선택</option>
          <option value="">SKT</option>
          <option value="">SKT알뜰폰</option>
          <option value="">KT</option>
          <option value="">KT알뜰폰</option>
          <option value="">LG U+</option>
          <option value="">LG U+알뜰폰</option>
        </select>

        <div class="">
          <div>
            <input type="radio" name="gender" id="male" />
            <label for="male">남자</label>
            <input type="radio" name="gender" id="female" />
            <label for="female">여자</label>
          </div>
          <div>
            <input type="radio" name="foreiner" id="foreigner1" />
            <label for="foreigner1">내국인</label>
            <input type="radio" name="foreiner" id="foreigner2" />
            <label for="foreigner2">외국인</label>
          </div>
        </div>
      </div>
      <div class="tel-info">
        <label for="phone">p</label>
        <input type="tel" name="phone" id="phone" placeholder="휴대전화번호" />
      </div>
      <div class="agreement-info">
        <input type="checkbox" name="agree" id="agree" />
        <label for="agree"><span>[필수]</span>인증 약관 전체동의</label>
      </div>
    </div>
  </body>
</html>
